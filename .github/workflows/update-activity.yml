name: Update GitHub Activity

on:
  schedule:
    - cron: '0 0 * * *'  # midnight UTC daily
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      # Recent events (for the ticker)
      - name: Fetch events
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/dduyanhhoang/events?per_page=100" \
            > public/github-activity.json

      # Full contribution calendar via GraphQL (for the heatmap)
      - name: Fetch contribution calendar
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_CONTRIBUTIONS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ user(login: \"dduyanhhoang\") { contributionsCollection { contributionCalendar { totalContributions weeks { contributionDays { date contributionCount } } } } } }"}' \
            https://api.github.com/graphql \
            | jq '[.data.user.contributionsCollection.contributionCalendar.weeks[].contributionDays[] | {date: .date, count: .contributionCount}]' \
            > public/github-contributions.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/github-activity.json public/github-contributions.json
          git diff --cached --quiet \
            || git commit -m "chore: update github activity"
          git push
