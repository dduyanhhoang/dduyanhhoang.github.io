name: Update GitHub Activity

on:
  schedule:
    - cron: '0 0 * * *'  # midnight UTC daily
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch events
        run: |
          response=$(curl -sS \
            "https://api.github.com/users/dduyanhhoang/events?per_page=100")

          if echo "$response" | jq -e 'type == "array" and length > 0' > /dev/null; then
            echo "$response" > public/github-activity.json
            count=$(echo "$response" | jq 'length')
            echo "Fetched $count events for ticker"
          else
            echo "Failed: Expected non-empty array, got:"
            echo "$response" | head -c 500
            exit 1
          fi

      - name: Fetch contribution calendar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          response=$(curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ user(login: \"dduyanhhoang\") { contributionsCollection { contributionCalendar { totalContributions weeks { contributionDays { date contributionCount } } } } } }"}' \
            https://api.github.com/graphql)

          data=$(echo "$response" | jq '[.data.user.contributionsCollection.contributionCalendar.weeks[].contributionDays[] | {date: .date, count: .contributionCount}]')

          if echo "$data" | jq -e 'type == "array" and length > 0' > /dev/null; then
            echo "$data" > public/github-contributions.json
            total=$(echo "$data" | jq '[.[].count] | add')
            echo "Fetched contribution calendar with $total total contributions"
          else
            echo "Failed: Expected non-empty contributions array"
            echo "Response: $response" | head -c 500
            exit 1
          fi

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/github-activity.json public/github-contributions.json
          git diff --cached --quiet \
            || git commit -m "chore: update github activity"
          git push
